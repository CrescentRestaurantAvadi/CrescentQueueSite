<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Crescent — Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="icon" type="image/png" href="CR1.png" />
    
    <style>
      :root {
        --black: #000000;
        --white: #FFFFFF;
        --gray: #F2F2F2;
        --red: #FF3000;
        --border: 2px solid #000;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--white);
        color: var(--black);
        font-family: 'Inter', Helvetica, Arial, sans-serif;
        min-height: 100vh;
        background-image: radial-gradient(circle, #00000008 1px, transparent 1px);
        background-size: 16px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Container */
      .register-container {
        max-width: 500px;
        width: 90%;
        margin: 2rem auto;
      }

      /* Card / Panel styling - Brutalist minimal */
      .register-panel {
        background: var(--white);
        border: var(--border);
        overflow: hidden;
      }

      /* Header */
      .panel-header {
        background: var(--black);
        padding: 1.5rem;
        text-align: center;
        border-bottom: var(--border);
      }

      .panel-header h2 {
        color: var(--white);
        font-size: 0.85rem;
        font-weight: 900;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin: 0;
      }

      .panel-header h2 span {
        color: var(--red);
      }

      /* Body */
      .panel-body {
        padding: 2rem;
      }

      /* Form styling */
      .form-group {
        margin-bottom: 1.75rem;
      }

      .form-label {
        display: block;
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: #888;
        margin-bottom: 0.5rem;
      }

      .form-control {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 2px solid var(--black);
        padding: 0.6rem 0;
        color: var(--black);
        font-family: 'Inter', Helvetica, Arial, sans-serif;
        font-size: 1rem;
        font-weight: 500;
        outline: none;
        transition: border-color 0.1s;
        border-radius: 0;
      }

      .form-control:focus {
        border-bottom-color: var(--red);
      }

      .form-control::placeholder {
        color: #bbb;
        font-weight: 400;
      }

      /* Button styling */
      .btn-submit {
        width: 100%;
        background: var(--black);
        color: var(--white);
        border: var(--border);
        padding: 0.9rem;
        font-family: 'Inter', Helvetica, Arial, sans-serif;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.1s;
        margin-top: 0.5rem;
      }

      .btn-submit:hover {
        background: var(--red);
        border-color: var(--red);
      }

      /* Result panel */
      .result-panel {
        margin-top: 1.5rem;
        background: var(--white);
        border: var(--border);
        overflow: hidden;
      }

      .result-header {
        background: var(--black);
        padding: 1rem;
        text-align: center;
        border-bottom: var(--border);
      }

      .result-header h3 {
        color: var(--white);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin: 0;
      }

      .result-body {
        padding: 2rem;
        text-align: center;
      }

      .queue-number {
        font-size: 4rem;
        font-weight: 900;
        letter-spacing: 0.05em;
        color: var(--red);
        margin-bottom: 1rem;
        font-family: 'Inter', monospace;
      }

      .customer-info {
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--black);
        margin-bottom: 1.5rem;
        letter-spacing: 0.02em;
      }

      .btn-next {
        background: var(--white);
        color: var(--black);
        border: var(--border);
        padding: 0.7rem 1.5rem;
        font-family: 'Inter', Helvetica, Arial, sans-serif;
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.1s;
      }

      .btn-next:hover {
        background: var(--black);
        color: var(--white);
      }

      /* Utility */
      .d-none {
        display: none !important;
      }

      @media (max-width: 640px) {
        .panel-body {
          padding: 1.5rem;
        }
        .queue-number {
          font-size: 2.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="register-container">
      <!-- Registration Form Panel -->
      <div class="register-panel" id="registrationPanel">
        <div class="panel-header">
          <h2>CRESCENT <span>REGISTER</span></h2>
        </div>
        <div class="panel-body">
          <form id="queueForm">
            <div class="form-group">
              <label class="form-label">Your Name</label>
              <input
                type="text"
                class="form-control"
                id="customerName"
                placeholder="Enter full name"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">Party Size</label>
              <input
                type="number"
                class="form-control"
                id="partySize"
                min="1"
                value="2"
                required
              />
            </div>
            <button type="submit" class="btn-submit">
              Get Queue Number
            </button>
          </form>
        </div>
      </div>

      <!-- Result Panel (Hidden initially) -->
      <div id="queueResult" class="result-panel d-none">
        <div class="result-header">
          <h3>YOUR QUEUE NUMBER</h3>
        </div>
        <div class="result-body">
          <div class="queue-number" id="queueNumberDisplay">Q-001</div>
          <div class="customer-info" id="customerInfo">Name: John Doe (Party of 2)</div>
          <button id="newCustomerBtn" class="btn-next">
            Next Customer
          </button>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
      // Your existing script.js content here
      // Make sure to keep all your Firebase logic intact
    </script>
    <script src="script.js"></script>
  </body>
</html>
