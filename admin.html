<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Queue Admin — Crescent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="icon" type="image/png" href="CR1.png" />
    <style>
      :root {
        --black: #000000;
        --white: #FFFFFF;
        --gray: #F2F2F2;
        --red: #FF3000;
        --border: 2px solid #000;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--white);
        color: var(--black);
        font-family: 'Inter', Helvetica, Arial, sans-serif;
        min-height: 100vh;
        background-image: radial-gradient(circle, #00000008 1px, transparent 1px);
        background-size: 16px 16px;
      }

      /* Top bar */
      .topbar {
        background: var(--black);
        border-bottom: var(--border);
        padding: 0 2rem;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .topbar-brand {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .topbar-brand-name {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--white);
      }

      .topbar-brand-sep {
        width: 1px;
        height: 16px;
        background: #444;
      }

      .topbar-brand-tag {
        font-size: 0.65rem;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #888;
      }

      .live-indicator {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.65rem;
        font-weight: 700;
        color: var(--red);
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .live-dot {
        width: 6px;
        height: 6px;
        background: var(--red);
        animation: blink 1.4s step-end infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* Main layout */
      .main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2.5rem 2rem;
      }

      /* Stats row */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border: var(--border);
        margin-bottom: 2.5rem;
      }

      .stat-card {
        padding: 1.5rem 2rem;
        border-right: var(--border);
      }

      .stat-card:last-child { border-right: none; }

      .stat-label {
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #666;
        margin-bottom: 0.5rem;
      }

      .stat-value {
        font-size: 3.5rem;
        font-weight: 900;
        line-height: 1;
        color: var(--black);
      }

      .stat-value.red { color: var(--red); }

      /* Controls */
      .controls {
        display: flex;
        align-items: center;
        gap: 0;
        margin-bottom: 0;
        border: var(--border);
        border-bottom: none;
      }

      .controls-title {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--black);
        padding: 0.75rem 1.25rem;
        border-right: var(--border);
        margin-right: auto;
        background: var(--gray);
      }

      .btn-ctrl {
        border: none;
        border-left: var(--border);
        padding: 0.75rem 1.25rem;
        font-family: 'Inter', Helvetica, Arial, sans-serif;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.1s, color 0.1s;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        background: var(--white);
        color: var(--black);
        height: 100%;
      }

      .btn-ctrl:hover { background: var(--black); color: var(--white); }
      .btn-clear-all:hover { background: var(--red); color: var(--white); }

      /* Table */
      .table-wrap {
        border: var(--border);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead tr {
        background: var(--gray);
        border-bottom: var(--border);
      }

      thead th {
        padding: 0.75rem 1.25rem;
        font-size: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #666;
        font-weight: 700;
        white-space: nowrap;
        text-align: left;
        border-right: 1px solid #ddd;
      }

      thead th:last-child { border-right: none; }

      tbody tr {
        border-bottom: 1px solid #e0e0e0;
        transition: background 0.1s;
      }

      tbody tr:last-child { border-bottom: none; }
      tbody tr:hover { background: var(--gray); }

      tbody td {
        padding: 1rem 1.25rem;
        font-size: 0.875rem;
        vertical-align: middle;
        border-right: 1px solid #eee;
      }

      tbody td:last-child { border-right: none; }

      .queue-num {
        font-size: 0.75rem;
        font-weight: 900;
        letter-spacing: 0.05em;
        color: var(--red);
      }

      .customer-name { font-weight: 500; }

      .party-size { color: #666; font-size: 0.85rem; }

      .time-cell { color: #888; font-size: 0.8rem; font-variant-numeric: tabular-nums; }

      /* Status badges */
      .badge-status {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        border: 2px solid currentColor;
      }

      .badge-waiting { color: var(--black); }
      .badge-serving { color: var(--white); background: var(--black); border-color: var(--black); }
      .badge-completed { color: #999; border-color: #ccc; }

      /* Action buttons */
      .actions { display: flex; gap: 0.35rem; align-items: center; }

      .btn-action {
        border: 2px solid var(--black);
        padding: 0.25rem 0.6rem;
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.1s, color 0.1s;
        font-family: 'Inter', Helvetica, Arial, sans-serif;
        background: var(--white);
        color: var(--black);
      }

      .btn-complete:hover, .btn-edit:hover { background: var(--black); color: var(--white); }
      .btn-remove { border-color: var(--red); color: var(--red); }
      .btn-remove:hover { background: var(--red); color: var(--white); }

      /* Empty state */
      .empty-state {
        padding: 4rem 2rem;
        text-align: center;
        color: #bbb;
      }

      .empty-state p {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      /* Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.75);
        z-index: 999;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s;
      }

      .modal-overlay.active { opacity: 1; pointer-events: all; }

      .modal-box {
        background: var(--white);
        border: var(--border);
        padding: 2rem;
        width: 90%;
        max-width: 400px;
        transform: translateY(10px);
        transition: transform 0.15s;
      }

      .modal-overlay.active .modal-box { transform: translateY(0); }

      .modal-title {
        font-size: 0.7rem;
        font-weight: 900;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        color: var(--black);
      }

      .modal-title span { color: var(--red); }

      .form-group { margin-bottom: 1.5rem; }

      .form-label {
        display: block;
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: #888;
        margin-bottom: 0.5rem;
      }

      .form-input {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 2px solid var(--black);
        padding: 0.5rem 0;
        color: var(--black);
        font-family: 'Inter', Helvetica, Arial, sans-serif;
        font-size: 0.95rem;
        font-weight: 500;
        outline: none;
        transition: border-color 0.1s;
      }

      .form-input:focus { border-color: var(--red); }
      .form-input::placeholder { color: #bbb; }

      .modal-actions {
        display: flex;
        gap: 0;
        margin-top: 2rem;
        border: var(--border);
      }

      .btn-modal-save {
        flex: 1;
        background: var(--black);
        color: var(--white);
        border: none;
        border-right: var(--border);
        padding: 0.8rem;
        font-family: 'Inter', Helvetica, Arial, sans-serif;
        font-weight: 700;
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.1s;
      }

      .btn-modal-save:hover { background: var(--red); }

      .btn-modal-cancel {
        flex: 1;
        background: var(--white);
        color: var(--black);
        border: none;
        padding: 0.8rem;
        font-family: 'Inter', Helvetica, Arial, sans-serif;
        font-weight: 700;
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.1s;
      }

      .btn-modal-cancel:hover { background: var(--gray); }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: var(--black);
        color: var(--white);
        border: var(--border);
        padding: 0.85rem 1.25rem;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        z-index: 9999;
        transform: translateY(60px);
        opacity: 0;
        transition: all 0.2s;
        max-width: 280px;
      }

      .toast.show { transform: translateY(0); opacity: 1; }
      .toast.success { border-left: 4px solid #00c070; }
      .toast.error { border-left: 4px solid var(--red); }

      @media (max-width: 640px) {
        .stats-row { grid-template-columns: repeat(3, 1fr); }
        .stat-value { font-size: 2.2rem; }
        thead th:nth-child(3), tbody td:nth-child(3),
        thead th:nth-child(4), tbody td:nth-child(4) { display: none; }
        .topbar { padding: 0 1rem; }
        .main { padding: 1rem; }
        .controls-title { display: none; }
      }
    </style>
  </head>
  <body>

    <div class="topbar">
      <div class="topbar-brand">
        <span class="topbar-brand-name">Crescent</span>
        <div class="topbar-brand-sep"></div>
        <span class="topbar-brand-tag">Queue Admin</span>
      </div>
      <div class="live-indicator">
        <div class="live-dot"></div>
        Live
      </div>
    </div>

    <div class="main">

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div class="stat-value red" id="totalCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Waiting</div>
          <div class="stat-value" id="waitingCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Done</div>
          <div class="stat-value" id="completedCount">0</div>
        </div>
      </div>

      <div class="controls">
        <div class="controls-title">Queue</div>
        <button id="refreshBtn" class="btn-ctrl btn-refresh">↺ Refresh</button>
        <button id="clearCompletedBtn" class="btn-ctrl btn-clear-done">✓ Clear Done</button>
        <button id="clearAllBtn" class="btn-ctrl btn-clear-all">✕ Clear All</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Queue #</th>
              <th>Name</th>
              <th>Party</th>
              <th>Time</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="queueTable"></tbody>
        </table>
      </div>

    </div>

    <div class="modal-overlay" id="editModal">
      <div class="modal-box">
        <div class="modal-title">Edit <span>Entry</span></div>
        <input type="hidden" id="editDocId"/>
        <div class="form-group">
          <label class="form-label">Customer Name</label>
          <input type="text" class="form-input" id="editName" placeholder="Enter name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Party Size</label>
          <input type="number" class="form-input" id="editPartySize" min="1" max="20" placeholder="Number of guests"/>
        </div>
        <div class="modal-actions">
          <button class="btn-modal-save" id="editSave">Save</button>
          <button class="btn-modal-cancel" id="editCancel">Cancel</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
